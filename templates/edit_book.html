{% extends "base.html" %}
{% block content %}

<div class="form-card">
  <h2>Edit Book</h2>

  <form method="POST" enctype="multipart/form-data" class="book-form">
    <input type="text" name="book_name" value="{{ book.book_name }}" placeholder="Book Name" required>
    <input type="text" name="author" value="{{ book.author }}" placeholder="Author Name" required>
    <input type="number" step="0.01" name="price" value="{{ book.price }}" placeholder="Price" required>
    <input type="text" name="contact_number" value="{{ book.contact_number or '' }}" placeholder="Contact Number">

    <select name="condition">
      <option value="">Select Condition</option>
      <option value="Like New" {% if book.condition == "Like New" %}selected{% endif %}>Like New</option>
      <option value="Good" {% if book.condition == "Good" %}selected{% endif %}>Good</option>
      <option value="Fair" {% if book.condition == "Fair" %}selected{% endif %}>Fair</option>
      <option value="Old" {% if book.condition == "Old" %}selected{% endif %}>Old</option>
    </select>

    <textarea name="description" placeholder="Write about the book, edition, condition, notes, etc.">{{ book.description or '' }}</textarea>

    <label>Change Book Image</label>
    <input type="file" name="image">

    <button type="submit" class="btn secondary full-btn">Update Book</button>
  </form>
</div>

{% endblock %}
